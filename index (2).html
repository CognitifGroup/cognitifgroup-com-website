<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cognitif Group</title>
<style>
  :root{
    --navy:#10243F;
    --coral:#D4785F;
    --coral-deep:#A8532F;
    --paper:#F6F5EE;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{
    background:var(--paper);
    color:var(--navy);
    font-family:Arial,Helvetica,sans-serif;
    display:flex;
    align-items:center;
    justify-content:center;
    min-height:100vh;
    text-align:center;
    padding:2rem;
  }
  .content{max-width:600px;}
  h1{
    font-family:Georgia,"Times New Roman",serif;
    font-size:2.5rem;
    color:var(--navy);
    margin-bottom:0.75rem;
    letter-spacing:0.02em;
  }
  p.tagline{
    font-size:1.1rem;
    color:var(--coral-deep);
    margin-bottom:2rem;
  }
  p.status{
    font-size:1rem;
    color:var(--navy);
    opacity:0.75;
  }
  .rule{
    width:60px;
    height:3px;
    background:var(--coral);
    margin:1.5rem auto;
    border:none;
  }
</style>
</head>
<body>
  <div class="content">
    <h1>Cognitif Group</h1>
    <hr class="rule">
    <p class="tagline">Coming soon.</p>
    <p class="status">This site is under construction.</p>
  </div>
</body>
</html>
